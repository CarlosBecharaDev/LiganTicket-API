# Configuracion para desarrollo local

spring.datasource.url=jdbc:postgresql://localhost:5432/ligan_ticket_db
spring.datasource.username=ligan_user
spring.datasource.password=ligan_pass

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

jwt.secret=desarrollo-local-secreto-2026-con-clave-de-32-bytes
jwt.expiration=86400000
