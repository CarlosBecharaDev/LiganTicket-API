spring.application.name=ligan-ticket

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ligan_ticket_db}
spring.datasource.username=${DB_USER:ligan_user}
spring.datasource.password=${DB_PASSWORD:ligan_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

jwt.secret=${JWT_SECRET:clave-secreta-super-larga-para-firmar-tokens-de-liganticket-2026-cambiar-en-produccion}
jwt.expiration=86400000

springdoc.swagger-ui.path=/swagger-ui.html
